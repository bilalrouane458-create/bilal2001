
<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Contact - Bilal Rouane</title>
    <link rel="stylesheet" href="CSS/index.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --text-main: #334155;
            --bg-light: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        .container-pro {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Header Contact */
        .header-minimal {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-minimal h1 {
            font-size: 2.2rem;
            color: var(--dark);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header-minimal .separator {
            width: 60px;
            height: 4px;
            background: var(--primary);
            margin: 0 auto 20px;
            border-radius: 10px;
        }

        /* Layout en 2 colonnes */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            align-items: start;
        }

        /* Colonne Gauche : Infos */
        .info-panel {
            display: grid;
            gap: 20px;
        }

        .info-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e2e8f0;
        }

        .info-card i {
            font-size: 1.2rem;
            color: var(--primary);
            background: #eff6ff;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .info-card div h4 {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-card div p, .info-card div a {
            margin: 0;
            font-weight: 600;
            color: var(--dark);
            text-decoration: none;
            font-size: 1rem;
        }

        /* Colonne Droite : Formulaire */
        .form-panel {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #fdfdfd;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-send {
            background: var(--dark);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-send:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        /* Responsivité */
        @media (max-width: 900px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        </header>

    <main class="container-pro">
        <div class="header-minimal">
            <h1>Travaillons ensemble</h1>
            <div class="separator"></div>
            <p>Une question ? Un projet ? Je vous répondrai sous 24/48h.</p>
        </div>

        <div class="contact-wrapper">
            
            <aside class="info-panel">
                <div class="info-card">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <a href="mailto:bilal.rouane.pro@gmail.com">bilal.rouane.pro@gmail.com</a>
                    </div>
                </div>
                
                <div class="info-card">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h4>Téléphone</h4>
                        <p>+33 7 43 29 02 09</p>
                    </div>
                </div>

                <div class="info-card">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Localisation</h4>
                        <p>Paris & Île-de-France</p>
                    </div>
                </div>

                <div class="info-card" style="border-left: 4px solid #16a34a;">
                    <i class="fas fa-calendar-check" style="color: #16a34a; background: #f0fdf4;"></i>
                    <div>
                        <h4>Disponibilité</h4>
                        <p>Alternance - Sept. 2025</p>
                    </div>
                </div>

                <div class="info-card">
                    <i class="fab fa-linkedin" style="color: #0077b5; background: #f0f9ff;"></i>
                    <div>
                        <h4>LinkedIn</h4>
                        <a href="https://linkedin.com/in/bilal-rouane-311133340/" target="_blank">Profil Professionnel</a>
                    </div>
                </div>
            </aside>

            <section class="form-panel">
                <form action="#" method="POST">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" placeholder="Ex: Jean Dupont" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="nom@exemple.com" required>
                        </div>
                        <div class="form-group full-width">
                            <label>Objet du message</label>
                            <select required>
                                <option value="">Sélectionner une option</option>
                                <option value="alternance">Proposition d'alternance</option>
                                <option value="projet">Collaboration projet</option>
                                <option value="autre">Autre demande</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Votre message</label>
                            <textarea rows="5" placeholder="Comment puis-je vous aider ?" required></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-send full-width">
                        <i class="fas fa-paper-plane"></i> Envoyer le message
                    </button>
                </form>
            </section>

        </div>
    </main>

    </body>
</html>
